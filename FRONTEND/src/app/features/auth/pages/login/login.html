<div class="login-page">
  <div class="login-illustration">
    <div class="illustration-content">
      <h1 class="brand">Nexus</h1>
      <p class="tagline">Sistema de Triagem de Ativos</p>
    </div>
  </div>

  <div class="login-panel">
    <form class="login-form" (ngSubmit)="onSubmit()">
      <h2>Entrar</h2>
      <p class="subtitle">Acesse sua conta para continuar</p>

      <label for="login">Login</label>
      <input id="login" name="login" type="text" [(ngModel)]="login" required autocomplete="username" />

      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" [(ngModel)]="senha" required autocomplete="current-password" />

      @if (erro()) {
        <p class="erro">{{ erro() }}</p>
      }

      <button type="submit" [disabled]="carregando()">
        {{ carregando() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
