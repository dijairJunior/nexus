spring.application.name=nexus

# ── Banco de dados ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://192.168.0.9:3306/triagem_ativos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
