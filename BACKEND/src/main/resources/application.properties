# ── Aplicação ──────────────────────────────────────────────
spring.application.name=nexus

# ── Banco de dados ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://192.168.0.9:3306/triagem_ativos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=nexus_app
spring.datasource.password=D006wi9C*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Flyway ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Porta ──────────────────────────────────────────────────
server.port=3480

# ── LOG ────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG

# Pool de conexões
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=15000

# Evita transação ficar aberta durante toda a request (causa comum desse tipo de travamento)
spring.jpa.open-in-view=false